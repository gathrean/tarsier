name: Tarsier
options:
  bundleIdPrefix: com.tarsierapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_FILE: Tarsier/Info.plist
    INFOPLIST_KEY_CFBundleDisplayName: "Tarsier"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.education"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    SWIFT_EMIT_LOC_STRINGS: true

packages:
  GoogleGenerativeAI:
    url: https://github.com/google/generative-ai-swift
    from: "0.5.6"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "5.0.0"
  SuperwallKit:
    url: https://github.com/superwall/Superwall-iOS
    from: "4.0.0"

targets:
  Tarsier:
    type: application
    platform: iOS
    sources:
      - path: Tarsier
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Tarsier/Assets.xcassets
      - path: Tarsier/Resources/Lessons
        buildPhase: resources
      - path: Tarsier/Resources/Sounds
        buildPhase: resources
    dependencies:
      - package: GoogleGenerativeAI
      - package: RevenueCat
        product: RevenueCat
      - package: SuperwallKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tarsierapp.tarsier
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: true
    scheme:
      buildTargets:
        Tarsier: all
